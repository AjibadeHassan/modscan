name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  self-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core only, no LLM SDKs)
        run: python -m pip install -e .

      - name: Run self-checks
        run: |
          for t in parser detector validator providers factblocks manifest docgen cli scaffold; do
            echo "== test_$t =="
            python tests/test_$t.py
          done

      - name: Import works without LLM SDKs
        run: python -c "import modscan; print('modscan import OK', len(modscan.__all__), 'exports')"
